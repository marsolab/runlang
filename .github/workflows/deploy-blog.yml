name: Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - "blog/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  RELEASE_NAME: runlang-strapi
  NAMESPACE: blog
  CHART_PATH: blog/helm

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Strapi to Kubernetes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Add Helm dependency repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build "${{ env.CHART_PATH }}"

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install "${{ env.RELEASE_NAME }}" "${{ env.CHART_PATH }}" \
            --namespace "${{ env.NAMESPACE }}" \
            --create-namespace \
            -f "${{ env.CHART_PATH }}/values.production.yaml" \
            --set postgresql.auth.password="${{ secrets.STRAPI_DB_PASSWORD }}" \
            --set postgresql.auth.postgresPassword="${{ secrets.STRAPI_DB_POSTGRES_PASSWORD }}" \
            --set strapi.adminJwtSecret="${{ secrets.STRAPI_ADMIN_JWT_SECRET }}" \
            --set strapi.apiTokenSalt="${{ secrets.STRAPI_API_TOKEN_SALT }}" \
            --set strapi.appKeys="${{ secrets.STRAPI_APP_KEYS }}" \
            --set strapi.transferTokenSalt="${{ secrets.STRAPI_TRANSFER_TOKEN_SALT }}" \
            --set strapi.jwtSecret="${{ secrets.STRAPI_JWT_SECRET }}" \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/"${{ env.RELEASE_NAME }}" \
            --namespace "${{ env.NAMESPACE }}" \
            --timeout=3m
