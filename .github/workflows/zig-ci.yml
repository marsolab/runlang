name: Zig CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build compiler
        run: zig build

      - name: Run E2E tests
        run: zig build test-e2e

  zig-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Zig test
        run: zig test src/root.zig

  runtime-sanitize:
    # Sanitizer libraries (libasan, libubsan) are only available as standalone
    # system libraries on Linux (GCC). macOS embeds them in compiler-rt.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build with sanitizers
        run: zig build -Dsanitize=true

      - name: Test with sanitizers
        run: zig build test -Dsanitize=true

  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        run: clang-tidy src/runtime/*.c -- -Isrc/runtime -D_GNU_SOURCE

  clang-format:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: clang-format --dry-run --Werror src/runtime/*.c src/runtime/*.h

  stdlib-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build compiler
        run: zig build

      - name: Check all stdlib packages
        run: |
          passed=0
          failed=0
          failed_files=""

          while IFS= read -r file; do
            if ./zig-out/bin/run check "$file" > /dev/null 2>&1; then
              echo "PASS: $file"
              passed=$((passed + 1))
            else
              echo "FAIL: $file"
              failed=$((failed + 1))
              failed_files="$failed_files$file"$'\n'
            fi
          done < <(find stdlib/ -name '*.run' ! -name '*_test.run' | sort)

          echo ""
          echo "==============================="
          echo "Results: $passed passed, $failed failed (out of $((passed + failed)) files)"
          echo "==============================="

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "Failed files:"
            echo "$failed_files"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Stdlib Compilation Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r file; do
            if ./zig-out/bin/run check "$file" > /dev/null 2>&1; then
              echo "| \`$file\` | :white_check_mark: Pass |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$file\` | :x: Fail |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < <(find stdlib/ -name '*.run' ! -name '*_test.run' | sort)
