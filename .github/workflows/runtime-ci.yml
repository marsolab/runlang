name: Runtime CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/runtime-ci.yml'
      - 'README.md'
      - 'benchmarks/runtime/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'src/runtime/**'
      - 'zig-pkg/**'
  pull_request:
    paths:
      - '.github/workflows/runtime-ci.yml'
      - 'README.md'
      - 'benchmarks/runtime/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'src/runtime/**'
      - 'zig-pkg/**'

permissions:
  contents: read

env:
  ZIG_VERSION: "0.16.0"

defaults:
  run:
    shell: bash

jobs:
  runtime:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
          - os: macos-latest
            artifact: macos-arm64
          - os: macos-13
            artifact: macos-x86_64
          - os: windows-latest
            artifact: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build runtime
        run: zig build

      - name: Runtime tests
        run: zig build test-runtime

      - name: Run benchmarks
        run: zig build bench-runtime 2>&1 | tee runtime-benchmarks.txt

      - name: Verify benchmark artifact
        run: test -s bench-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-benchmarks-${{ matrix.artifact }}
          path: |
            bench-results.json
            runtime-benchmarks.txt
          if-no-files-found: error
