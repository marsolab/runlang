name: run-lang
version: '0.1.0'
summary: Systems programming language compiler
description: |
  Run is a systems programming language that combines the simplicity and
  readability of Go with fine-grained control over memory and hardware.
  It features generational references for memory safety without a garbage
  collector or borrow checker, green threads for concurrency, and compiles
  to native code via C.

  The compiler requires Zig (>= 0.16) as it uses 'zig cc' for C compilation
  and linking. Make sure Zig is installed and available in your PATH.

  Homepage: https://runlang.dev
  Source:   https://github.com/marsolab/runlang

base: core22
grade: devel
confinement: classic

architectures:
  - build-on: amd64
  - build-on: arm64

parts:
  run:
    plugin: dump
    source: https://github.com/marsolab/runlang/releases/download/v${SNAPCRAFT_PROJECT_VERSION}/run-${SNAPCRAFT_PROJECT_VERSION}-linux-$CRAFT_ARCH_BUILD_FOR.tar.gz
    organize:
      run-*/bin/run: bin/run
      run-*/lib/librunrt.a: lib/librunrt.a
      run-*/include/run/: include/run/
    stage:
      - bin/run
      - lib/librunrt.a
      - include/run/

apps:
  run:
    command: bin/run
